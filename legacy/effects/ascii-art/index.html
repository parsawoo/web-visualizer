<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ASCII Art · Web-Visualizer</title>
  <link rel="icon" type="image/svg+xml"
    href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect x='2' y='2' width='5' height='5' rx='1' fill='%23b6ff3d'/%3E%3Crect x='9' y='9' width='5' height='5' rx='1' fill='%2319e3ff'/%3E%3C/svg%3E" />
  <link rel="stylesheet" href="../../assets/css/theme.css" />
  <link rel="stylesheet" href="../../assets/css/studio.css" />
</head>
<body class="studio" style="--accent: var(--grad-ascii); --accent-solid: #b6ff3d;">
  <div class="aurora"></div>
  <div class="grain"></div>

  <div class="topbar">
    <a href="../../index.html" class="back-btn">← LOBBY</a>
    <div class="studio-title">Ascii <span class="accent-text">Art</span></div>
    <div class="fmt-toggle">
      <span class="lbl">Export</span>
      <div class="switch" id="fmtSwitch">
        <button data-fmt="webm">WEBM·빠름</button>
        <button data-fmt="mp4">MP4·호환</button>
      </div>
    </div>
  </div>

  <div id="workspace">
    <div class="panel">
      <div class="panel-label">1 · Source</div>
      <div id="sourceContainer">
        <video id="sourceVideo" muted playsinline></video>
        <img id="sourceImage" alt="" />
      </div>
    </div>
    <div class="panel">
      <div class="panel-label render">2 · ASCII Render</div>
      <div id="renderArea">
        <canvas id="webglCanvas"></canvas>
        <div id="statusOverlay">
          <div class="spinner" id="loadingSpinner" style="display:none;"></div>
          <div id="statusText">영상/이미지와 음악을 올린 뒤<br><span class="hl">[BUILD ASCII]</span>로 분석을 시작하세요.</div>
          <div class="progress-bar-container" id="progressContainer"><div id="progressBar"></div></div>
        </div>
      </div>
    </div>
  </div>

  <div class="ui-panel">
    <div class="top-controls">
      <div class="control-group"><label class="ctl">Cell Size · 밀도</label><input type="range" id="uiCell" min="5" max="22" step="1" value="10"></div>
      <div class="control-group"><label class="ctl">ASCII Amount · 기본</label><input type="range" id="uiAmount" min="0" max="1" step="0.05" value="0.15"></div>
      <div class="control-group"><label class="ctl">Audio React</label><input type="range" id="uiReact" min="0" max="2" step="0.1" value="1.2"></div>
      <div class="control-group"><label class="ctl">React Band</label>
        <select id="uiBand">
          <option value="both" selected>Both · 음량+고음</option>
          <option value="volume">Volume · 음량</option>
          <option value="treble">Treble · 고음</option>
        </select>
      </div>
      <div class="control-group"><label class="ctl">Color Mode</label>
        <select id="uiColor">
          <option value="green" selected>Matrix Green</option>
          <option value="color">Original Color</option>
          <option value="mono">Mono</option>
          <option value="amber">Amber</option>
        </select>
      </div>
      <div class="control-group"><label class="ctl">Char Set</label>
        <select id="uiCharset">
          <option value="standard" selected>Standard</option>
          <option value="detailed">Detailed</option>
          <option value="blocks">Blocks</option>
        </select>
      </div>
      <div class="control-group"><label class="ctl">Background</label>
        <select id="uiBg">
          <option value="black" selected>Black</option>
          <option value="original">Original</option>
          <option value="white">White</option>
        </select>
      </div>
      <div class="control-group"><label class="ctl">EQ Signal</label><canvas id="audioVisualizer" width="150" height="42"></canvas></div>
      <div class="realtime-hint">※ 음량·고음이 클수록 완전 ASCII로 디졸브 · 슬라이더는 재생 중 실시간 반영</div>
    </div>
    <div class="bottom-controls">
      <div class="control-group"><label class="ctl">1 · Visual (MP4/IMG)</label><input type="file" id="visualUpload" accept="video/*,image/*" /></div>
      <div class="control-group"><label class="ctl">2 · Audio (MP3/WAV)</label><input type="file" id="audioUpload" accept="audio/*" /></div>
      <button class="btn primary" id="btnMake" disabled>3 · Build ASCII</button>
      <button class="btn go" id="btnPlay" disabled>Play</button>
      <button class="btn" id="btnFrame" disabled>Frame ↓</button>
      <button class="btn rec" id="btnRecord" disabled>● Export</button>
    </div>
  </div>

  <script type="module" src="./main.js"></script>
</body>
</html>
