<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cyber Tracker · Web-Visualizer</title>
  <link rel="icon" type="image/svg+xml"
    href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect x='2' y='2' width='5' height='5' rx='1' fill='%23ff2d6b'/%3E%3Crect x='9' y='9' width='5' height='5' rx='1' fill='%23ffb03d'/%3E%3C/svg%3E" />
  <link rel="stylesheet" href="../../assets/css/theme.css" />
  <link rel="stylesheet" href="../../assets/css/studio.css" />
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/holistic/holistic.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
</head>
<body class="studio" style="--accent: var(--grad-cyber); --accent-solid: #ff2d6b;">
  <div class="aurora"></div>
  <div class="grain"></div>

  <div id="mainLoader" style="position:fixed; inset:0; z-index:9999; display:flex; flex-direction:column; gap:1rem; justify-content:center; align-items:center; background:var(--bg-0);">
    <div class="spinner"></div>
    <div style="font-family:var(--font-mono); letter-spacing:0.18em; color:var(--accent-solid);">INITIALIZING DUAL AI ENGINE…</div>
  </div>

  <div class="topbar">
    <a href="../../index.html" class="back-btn">← LOBBY</a>
    <div class="studio-title">Cyber <span class="accent-text">Tracker</span></div>
    <div class="fmt-toggle">
      <span class="lbl">Export</span>
      <div class="switch" id="fmtSwitch">
        <button data-fmt="webm">WEBM·빠름</button>
        <button data-fmt="mp4">MP4·호환</button>
      </div>
    </div>
  </div>

  <div id="workspace">
    <div class="panel">
      <div class="panel-label">1 · Source</div>
      <div id="sourceContainer"><video id="sourceVideo" muted playsinline></video></div>
    </div>
    <div class="panel">
      <div class="panel-label render">2 · AI Render</div>
      <div id="renderArea">
        <canvas id="webglCanvas"></canvas>
        <canvas id="hudCanvas"></canvas>
        <div id="statusOverlay">
          <div id="statusText">영상을 올리고 (선택) 음악을 더한 뒤<br><span class="hl">[ANALYZE]</span>로 추적을 시작하세요.</div>
          <div class="progress-bar-container" id="progressContainer"><div id="progressBar"></div></div>
        </div>
      </div>
    </div>
  </div>

  <div class="ui-panel">
    <div class="top-controls">
      <div class="control-group"><label class="ctl">Box Style</label>
        <select id="uiBoxStyle">
          <option value="scope">Scope Bracket</option>
          <option value="label" selected>Label Info</option>
          <option value="glow">Neon Glow</option>
          <option value="basic">Basic</option>
        </select>
      </div>
      <div class="control-group"><label class="ctl">Effect (Shader)</label>
        <select id="uiEffect">
          <option value="0">None</option>
          <option value="2">Cyber Pixel</option>
          <option value="4">Target Zoom</option>
          <option value="8">Retro Dither (Color)</option>
          <option value="9" selected>Classic B&W Dither</option>
        </select>
      </div>
      <div class="control-group"><label class="ctl">Effect Int</label><input type="range" id="uiIntensity" min="0.1" max="2.0" step="0.1" value="1.0"></div>
      <div class="control-group"><label class="ctl">Audio React</label><input type="range" id="uiAudioReact" min="0" max="2.0" step="0.1" value="1.0"></div>
      <div class="control-group"><label class="ctl">Max Objects</label><input type="range" id="uiObjects" min="5" max="50" step="1" value="20"></div>
      <div class="control-group"><label class="ctl">AI Sensitivity</label><input type="range" id="uiSensitivity" min="0.01" max="0.5" step="0.01" value="0.1"></div>
      <div class="control-group"><label class="ctl">Face Detail</label><input type="range" id="uiNodes" min="0" max="10" step="1" value="4"></div>
      <div class="control-group"><label class="ctl">Line Style</label>
        <select id="uiLineStyle">
          <option value="solid">Solid</option>
          <option value="dashed">Dashed</option>
          <option value="curved" selected>Curved</option>
        </select>
      </div>
      <div class="control-group"><label class="ctl">Web Density</label><input type="range" id="uiLineDensity" min="0" max="0.6" step="0.01" value="0.3"></div>
      <div class="control-group"><label class="ctl">Color</label>
        <select id="uiColor">
          <option value="#ffffff">Pure White</option>
          <option value="#19e3ff">Neon Cyan</option>
          <option value="#ff2d6b" selected>Laser Pink</option>
          <option value="#ffb03d">Amber</option>
        </select>
      </div>
      <div class="control-group"><label class="ctl">EQ Signal</label><canvas id="audioVisualizer" width="150" height="42"></canvas></div>
    </div>
    <div class="bottom-controls">
      <div class="control-group"><label class="ctl">1 · Video (MP4)</label><input type="file" id="imageUpload" accept="video/*" /></div>
      <div class="control-group"><label class="ctl">2 · Audio (옵션)</label><input type="file" id="audioUpload" accept="audio/*" /></div>
      <button class="btn" id="btnReset">Reset</button>
      <button class="btn primary" id="btnAnalyze" disabled>3 · Analyze</button>
      <button class="btn go" id="btnPlay" disabled>Play</button>
      <button class="btn rec" id="btnRecord">● Export</button>
    </div>
  </div>

  <script type="module" src="./main.js"></script>
</body>
</html>
