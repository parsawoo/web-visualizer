<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Audio Matrix · Web-Visualizer</title>
  <link rel="icon" type="image/svg+xml"
    href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect x='2' y='2' width='5' height='5' rx='1' fill='%238b5cff'/%3E%3Crect x='9' y='9' width='5' height='5' rx='1' fill='%23ff2d95'/%3E%3C/svg%3E" />
  <link rel="stylesheet" href="../../assets/css/theme.css" />
  <link rel="stylesheet" href="../../assets/css/studio.css" />
</head>
<body class="studio" style="--accent: var(--grad-matrix); --accent-solid: #a855f7;">
  <div class="aurora"></div>
  <div class="grain"></div>

  <div class="topbar">
    <a href="../../index.html" class="back-btn">← LOBBY</a>
    <div class="studio-title">Audio <span class="accent-text">Matrix</span></div>
    <div class="fmt-toggle">
      <span class="lbl">Export</span>
      <div class="switch" id="fmtSwitch">
        <button data-fmt="webm">WEBM·빠름</button>
        <button data-fmt="mp4">MP4·호환</button>
      </div>
    </div>
  </div>

  <div id="workspace">
    <div class="panel">
      <div class="panel-label">1 · Source</div>
      <div id="sourceContainer">
        <video id="sourceVideo" controls playsinline></video>
        <img id="sourceImage" alt="" />
      </div>
    </div>
    <div class="panel">
      <div class="panel-label render">2 · Matrix Render</div>
      <div id="renderArea">
        <canvas id="webglCanvas"></canvas>
        <div id="statusOverlay">
          <div class="spinner" id="loadingSpinner" style="display:none;"></div>
          <div id="statusText">영상과 음악을 올린 뒤<br><span class="hl">[MAKE MATRIX]</span>로 오디오를 분석하세요.</div>
          <div class="progress-bar-container" id="progressContainer"><div id="progressBar"></div></div>
        </div>
      </div>
    </div>
  </div>

  <div class="ui-panel">
    <div class="top-controls">
      <div class="control-group"><label class="ctl">Resolution</label>
        <select id="uiResolution">
          <option value="128">Low · 16k</option>
          <option value="256" selected>Mid · 65k</option>
          <option value="384">High · 147k</option>
        </select>
      </div>
      <div class="control-group"><label class="ctl">Audio React</label><input type="range" id="uiSensitivity" min="0" max="5" step="0.1" value="1.5"></div>
      <div class="control-group"><label class="ctl">Z-Explosion</label><input type="range" id="uiDispersion" min="0" max="10" step="0.1" value="2.0"></div>
      <div class="control-group"><label class="ctl">Particle Size</label><input type="range" id="uiPointSize" min="1" max="10" step="0.5" value="3.0"></div>
      <div class="control-group"><label class="ctl">React Style</label>
        <select id="uiReactMode">
          <option value="0" selected>Brightness · 명도</option>
          <option value="1">Color Shift · 톤</option>
        </select>
      </div>
      <div class="control-group"><label class="ctl">Color Mode</label>
        <select id="uiColorMode">
          <option value="0" selected>Original</option>
          <option value="1">Neon Matrix</option>
          <option value="2">Cyberpunk</option>
          <option value="3">Golden Heat</option>
        </select>
      </div>
      <div class="control-group"><label class="ctl">Baked EQ</label><canvas id="audioVisualizer" width="150" height="42"></canvas></div>
      <div class="realtime-hint">※ 재생 중 슬라이더를 움직이면 실시간으로 반영됩니다.</div>
    </div>
    <div class="bottom-controls">
      <div class="control-group"><label class="ctl">1 · Visual (MP4/IMG)</label><input type="file" id="visualUpload" accept="video/*,image/*" /></div>
      <div class="control-group"><label class="ctl">2 · Audio (MP3/WAV)</label><input type="file" id="audioUpload" accept="audio/*" /></div>
      <button class="btn primary" id="btnMake" disabled>3 · Make Matrix</button>
      <button class="btn go" id="btnPlay" disabled>Play</button>
      <button class="btn rec" id="btnRecord" disabled>● Export</button>
    </div>
  </div>

  <script type="module" src="./main.js"></script>
</body>
</html>
